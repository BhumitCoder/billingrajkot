    <!-- Anti-DevTools Security -->
    <script>
      (function () {
        'use strict';

        // Allow full devtools access on localhost / 127.0.0.1
        if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') return;

        // ── 1. Block all DevTools keyboard shortcuts ────────────────────────
        var _blockedKeys = ['I','i','J','j','C','c','K','k','E','e','S','s'];
        document.addEventListener('keydown', function (e) {
          // F12
          if (e.key === 'F12') { e.preventDefault(); e.stopPropagation(); return false; }
          // Ctrl/Cmd + Shift + [DevTools keys]
          if ((e.ctrlKey || e.metaKey) && e.shiftKey && _blockedKeys.indexOf(e.key) !== -1) {
            e.preventDefault(); e.stopPropagation(); return false;
          }
          // Ctrl+U (View Source), Ctrl+S (Save)
          if ((e.ctrlKey || e.metaKey) && (e.key === 'u' || e.key === 'U' || e.key === 's' || e.key === 'S')) {
            e.preventDefault(); e.stopPropagation(); return false;
          }
          // F5 source panel shortcut blocked
          if (e.key === 'F5' && e.ctrlKey) { e.preventDefault(); return false; }
        }, true);

        // ── 2. Block right-click at both mousedown and contextmenu level ────
        document.addEventListener('contextmenu', function (e) {
          e.preventDefault(); e.stopPropagation(); return false;
        }, true);
        document.addEventListener('mousedown', function (e) {
          if (e.button === 2) { e.preventDefault(); e.stopPropagation(); return false; }
        }, true);
        document.addEventListener('pointerdown', function (e) {
          if (e.button === 2) { e.preventDefault(); e.stopPropagation(); return false; }
        }, true);

        // ── 3. Always-running debugger loop ────────────────────────────────
        setInterval(function () { debugger; }, 100);

        // ── 4. Disable text selection (harder to copy/scrape) ───────────────
        document.addEventListener('selectstart', function (e) {
          // Allow selection in input/textarea elements only
          var tag = e.target && e.target.tagName;
          if (tag !== 'INPUT' && tag !== 'TEXTAREA') {
            e.preventDefault(); return false;
          }
        }, true);

        // ── 5. Block drag (prevents dragging elements to inspect) ───────────
        document.addEventListener('dragstart', function (e) {
          e.preventDefault(); return false;
        }, true);

      })();
    </script>
